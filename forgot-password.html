<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Forgot Password – Aurevia</title>
<link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="auth.css" />
<script>
  // If already logged in, skip straight to profile
  (function() {
    const user = JSON.parse(localStorage.getItem('aurevia_user') || 'null');
    if (user && user.loggedIn) window.location.replace('profile.html');
  })();
</script>
</head>
<body class="forgot-page">

<div class="auth-bg">
  <img src="pictures/auth-bg.jpg" alt="" class="bg-img" />
  <div class="bg-overlay"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="storefront-homepage.html" class="auth-logo-btn">Aurevia</a>

    <div class="auth-card-body">

      <!-- STEP 1: Enter email -->
      <div id="step1">
        <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
        <h1 class="auth-title">Forgot Password</h1>
        <div class="auth-title-line"></div>

        <form class="auth-form" id="forgotForm" novalidate>
          <div class="form-group">
            <span class="form-icon">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" id="forgotEmail" placeholder="Enter your email address" autocomplete="email" required />
          </div>

          <button type="submit" class="btn-auth">Send Reset Link</button>

          <p class="auth-switch">Remember your password? <a href="login.html">Back to Login</a></p>
        </form>
      </div>

      <!-- STEP 2: Confirmation -->
      <div id="step2" style="display:none; text-align:center; padding: 12px 0 8px;">
        <div class="success-icon">✉</div>
        <h1 class="auth-title" style="margin-top:12px;">Check your email</h1>
        <div class="auth-title-line"></div>
        <p class="auth-subtitle" style="margin-bottom:24px; line-height:1.7;">
          We've sent a password reset link to<br />
          <strong id="sentEmailDisplay" style="color:#2e2e2e;"></strong>
        </p>
        <p class="resend-note">Didn't receive it? <button type="button" id="resendBtn" class="resend-btn">Resend email</button></p>
        <a href="login.html" class="btn-auth" style="display:block; margin-top:20px; text-align:center; text-decoration:none;">Back to Login</a>
      </div>

    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
