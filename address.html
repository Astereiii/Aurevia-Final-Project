<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Addresses – Aurevia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&family=Roboto:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="account.css" />
</head>
<body class="account-page" id="page-address">

<div class="account-header">
  <a href="profile.html" class="acc-back">←</a>
  <span class="acc-title">Addresses</span>
  <a href="cart.html" class="acc-cart">🛒</a>
</div>

<div class="account-container">
  <h2 class="account-page-title">Your Addresses</h2>

  <button class="acc-add-btn" onclick="openModal()">+ Add Address</button>

  <div id="addressList"></div>
</div>

<!-- MODAL -->
<div id="addressModal" class="acc-modal">
  <div class="acc-modal-content">
    <h3 id="modalTitle">Add Address</h3>
    <input type="text" id="addrName" placeholder="Full Name" />
    <input type="text" id="addrAddress" placeholder="Full Address" />
    <input type="text" id="addrPhone" placeholder="Phone Number" />
    <div class="acc-modal-buttons">
      <button onclick="saveAddress()">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="account.js"></script>
</body>
</html>
