<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login – Aurevia</title>
<link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="auth.css" />
<script>
  // If already logged in, skip straight to profile
  (function() {
    const user = JSON.parse(localStorage.getItem('aurevia_user') || 'null');
    if (user && user.loggedIn) window.location.replace('profile.html');
  })();
</script>
</head>
<body class="login-page">

<div class="auth-bg">
  <img src="pictures/auth-bg.jpg" alt="" class="bg-img" />
  <div class="bg-overlay"></div>
</div>

<div class="auth-wrapper">
  <div class="auth-card">

    <a href="storefront-homepage.html" class="auth-logo-btn">Login</a>

    <div class="auth-card-body">
      <p class="auth-subtitle">Sign in to your account to continue shopping.</p>
      <h1 class="auth-title">Login</h1>
      <div class="auth-title-line"></div>

      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <span class="form-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </span>
          <input type="email" id="loginEmail" placeholder="Email Address" autocomplete="email" required />
        </div>

        <div class="form-group">
          <span class="form-icon">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          </span>
          <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password" required />
          <button type="button" class="toggle-pw" id="toggleLoginPw" aria-label="Show password">
            <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>

        <div class="forgot-row">
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-auth">Sign In</button>

        <div class="auth-divider"><span>Or Log In with</span></div>

        <button type="button" class="btn-google">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/><path fill="none" d="M0 0h48v48H0z"/></svg>
          Sign in with Google
        </button>

        <p class="auth-switch">Don't have an account? <a href="register.html">Register Now</a></p>
      </form>
    </div>

  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
