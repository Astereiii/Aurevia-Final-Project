<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account – Aurevia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans&family=Roboto:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="account.css" />
</head>
<body class="account-page" id="page-profile">

<div class="account-header">
  <a href="storefront-homepage.html" class="acc-logo">Aurevia</a>
  <span class="acc-title">My Account</span>
  <a href="cart.html" class="acc-cart">🛒</a>
</div>

<div class="account-container">
  <h2 class="account-page-title">My Account</h2>

  <div class="profile-layout">

    <!-- LEFT: User info -->
    <div class="profile-card">
      <div class="acc-avatar">👤</div>
      <p class="acc-name" id="accName">User</p>
      <p class="acc-email" id="accEmail">—</p>
      <button class="acc-logout-btn" onclick="logout()">Log Out</button>
    </div>

    <!-- RIGHT: Menu -->
    <div class="menu-card">
      <a href="order-history.html" class="menu-link">Order History <span>›</span></a>
      <a href="address.html" class="menu-link">Addresses <span>›</span></a>
      <a href="help.html" class="menu-link">Help &amp; Support <span>›</span></a>
    </div>

  </div>

  <!-- Recent Orders -->
  <div class="acc-orders">
    <div class="acc-orders-header">
      <h3>Recent Orders</h3>
      <span>From your cart history</span>
    </div>
    <div class="acc-order">
      <span>Order #1</span>
      <span>Processing</span>
      <span>—</span>
      <button onclick="window.location.href='cart.html'">View ›</button>
    </div>
  </div>
</div>

<script src="account.js"></script>
</body>
</html>
